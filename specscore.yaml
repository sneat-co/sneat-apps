# SpecScore Repo Config Schema: https://specscore.md/repo-config

project:
    title: sneat-apps
    host: github.com
    org: sneat-co
    repo: sneat-apps

# Reviewer gates. Keyed by gate-point event (NOT command name).
# specstudio:specify consumes gates.feature.approved.
gates:
    feature.approved:
        reviewers:
            - name: spec-reviewer
              type: ai
              prompt: .specscore/reviewers/spec-reviewer.md
            - name: human-approval
              type: human
    plan.approved:
        reviewers:
            - name: plan-reviewer
              type: ai
              prompt: .specscore/reviewers/plan-reviewer.md
            - name: human-approval
              type: human
