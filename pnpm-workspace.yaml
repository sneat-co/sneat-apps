# pnpm workspace configuration
# See https://pnpm.io/pnpm-workspace_yaml
# In pnpm v11, overrides and build settings moved from package.json to pnpm-workspace.yaml

overrides:
  rxfire>tslib: "~2.8.0"
  # Dedupe @sneat/extension-contactus-internal to a single 0.12.3. The split
  # -shared packages peer-pin exactly 0.12.2, but we need 0.12.3 (which drops a
  # mis-listed DI provider); without this override pnpm keeps both copies and
  # fractures DI class identity. 0.12.3 is API-compatible with 0.12.2.
  "@sneat/extension-contactus-internal": "0.12.3"
  # Dedupe @sneat/* to a single 0.12.1 so the new split extension packages
  # (which peer-pin older 0.9.0/0.11.0) don't pull duplicate copies, which
  # would break DI token / class identity across the bundle.
  "@sneat/api": "0.12.1"
  "@sneat/auth-core": "0.12.1"
  "@sneat/auth-models": "0.12.1"
  "@sneat/auth-ui": "0.12.1"
  "@sneat/components": "0.12.1"
  "@sneat/core": "0.12.1"
  "@sneat/data": "0.12.1"
  "@sneat/datagrid": "0.12.1"
  "@sneat/dto": "0.12.1"
  "@sneat/grid": "0.12.1"
  "@sneat/logging": "0.12.1"
  "@sneat/space-components": "0.12.1"
  "@sneat/space-models": "0.12.1"
  "@sneat/space-services": "0.12.1"
  "@sneat/ui": "0.12.1"
  "@sneat/wizard": "0.12.1"

# allowBuilds replaces onlyBuiltDependencies (removed in pnpm v11)
# See https://pnpm.io/11.x/migration
allowBuilds:
  "@firebase/util": true
  "@parcel/watcher": true
  "@swc/core": true
  core-js: true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  oxc-resolver: true
  protobufjs: true
  re2: true
  unrs-resolver: true
