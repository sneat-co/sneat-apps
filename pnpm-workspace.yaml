# pnpm workspace configuration
# See https://pnpm.io/pnpm-workspace_yaml

# allowBuilds replaces onlyBuiltDependencies (removed in pnpm v11)
# See https://pnpm.io/11.x/migration
allowBuilds:
  "@firebase/util": true
  "@parcel/watcher": true
  "@swc/core": true
  core-js: true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  oxc-resolver: true
  protobufjs: true
  re2: true
  unrs-resolver: true
